<!DOCTYPE html>
<html>
<head>
<title>CSS Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="b">

<div class="container">

<h1>CSS Quiz</h1>

<h3>1. CSS stands for?</h3>
<input type="radio" name="q1" value="1"> Cascading Style Sheets<br>
<input type="radio" name="q1" value="0"> Creative Style Sheets<br>
<input type="radio" name="q1" value="0"> Computer Style Sheets<br>

<br>

<h3>2. Which property changes text color?</h3>
<input type="radio" name="q2" value="0"> font-style<br>
<input type="radio" name="q2" value="1"> color<br>
<input type="radio" name="q2" value="0"> background<br>

<br>

<h3>3. Which property changes background color?</h3>
<input type="radio" name="q3" value="1"> background-color<br>
<input type="radio" name="q3" value="0"> color<br>
<input type="radio" name="q3" value="0"> text-style<br>

<br><br>

<button onclick="check()">Submit Quiz</button>

</div>

<script>
function check(){
let correct = 0;
let answers = document.querySelectorAll("input[type=radio]:checked");

answers.forEach((ans)=>{
correct += Number(ans.value);
});

let total = 3;
let wrong = total - correct;

localStorage.setItem("correct",correct);
localStorage.setItem("wrong",wrong);
localStorage.setItem("total",total);

window.location="result.html";
}
</script>

</body>
</html>

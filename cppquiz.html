<!DOCTYPE html>
<html>
<head>
<title>C++ Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="b">

<div class="container">

<h1>C++ Quiz</h1>

<h3>1. Who developed C++?</h3>
<input type="radio" name="q1" value="1"> Bjarne Stroustrup<br>
<input type="radio" name="q1" value="0"> Dennis Ritchie<br>
<input type="radio" name="q1" value="0"> James Gosling<br>

<br>

<h3>2. C++ is which type of language?</h3>
<input type="radio" name="q2" value="1"> Object Oriented<br>
<input type="radio" name="q2" value="0"> Markup Language<br>
<input type="radio" name="q2" value="0"> Database Language<br>

<br>

<h3>3. Which is used for output?</h3>
<input type="radio" name="q3" value="1"> cout<br>
<input type="radio" name="q3" value="0"> cin<br>
<input type="radio" name="q3" value="0"> scanf<br>

<br><br>

<button onclick="check()">Submit Quiz</button>
<p align="right">
<a href="category.html">Back to category page</a>
</p>
</div>

<script>
function check(){
let correct = 0;
let answers = document.querySelectorAll("input[type=radio]:checked");

answers.forEach((ans)=>{
correct += Number(ans.value);
});

let total = 3;
let wrong = total - correct;

localStorage.setItem("correct",correct);
localStorage.setItem("wrong",wrong);
localStorage.setItem("total",total);

window.location="result.html";
}
</script>

</body>
</html>

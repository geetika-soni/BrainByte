<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Quiz - BrainByte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="b">

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="margin: 0; font-size: 2.5rem;">C++ Quiz</h1>
        <div style="background: rgba(139, 92, 246, 0.2); padding: 5px 15px; border-radius: 20px; color: var(--primary); font-weight: 600;">3 Questions</div>
    </div>

    <div class="question-block">
        <h3>1. Who developed C++?</h3>
        <div class="quiz-options">
            <label class="option-label">
                <input type="radio" name="q1" value="1">
                <div class="radio-custom"></div>
                Bjarne Stroustrup
            </label>
            <label class="option-label">
                <input type="radio" name="q1" value="0">
                <div class="radio-custom"></div>
                Dennis Ritchie
            </label>
            <label class="option-label">
                <input type="radio" name="q1" value="0">
                <div class="radio-custom"></div>
                James Gosling
            </label>
        </div>
    </div>

    <div class="question-block">
        <h3>2. C++ is which type of language?</h3>
        <div class="quiz-options">
            <label class="option-label">
                <input type="radio" name="q2" value="1">
                <div class="radio-custom"></div>
                Object Oriented
            </label>
            <label class="option-label">
                <input type="radio" name="q2" value="0">
                <div class="radio-custom"></div>
                Markup Language
            </label>
            <label class="option-label">
                <input type="radio" name="q2" value="0">
                <div class="radio-custom"></div>
                Database Language
            </label>
        </div>
    </div>

    <div class="question-block">
        <h3>3. Which is used for output?</h3>
        <div class="quiz-options">
            <label class="option-label">
                <input type="radio" name="q3" value="1">
                <div class="radio-custom"></div>
                cout
            </label>
            <label class="option-label">
                <input type="radio" name="q3" value="0">
                <div class="radio-custom"></div>
                cin
            </label>
            <label class="option-label">
                <input type="radio" name="q3" value="0">
                <div class="radio-custom"></div>
                scanf
            </label>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px;">
        <a href="category.html" style="color: var(--text-muted);">← Back to categories</a>
        <button onclick="check()" style="margin: 0;">Submit Quiz</button>
    </div>
</div>

<script>
function check(){
    let total = 3;
    let answers = document.querySelectorAll("input[type=radio]:checked");

    if (answers.length < total) {
        alert("Please answer all questions before submitting!");
        return;
    }

    let correct = 0;
    answers.forEach((ans)=>{
        correct += Number(ans.value);
    });

    let wrong = total - correct;

    localStorage.setItem("correct", correct);
    localStorage.setItem("wrong", wrong);
    localStorage.setItem("total", total);

    window.location = "result.html";
}
</script>

</body>
</html>

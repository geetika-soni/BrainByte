<!DOCTYPE html>
<html>
<head>
<title>JavaScript Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="b">

<div class="container">

<h1>JavaScript Quiz</h1>

<h3>1. JavaScript is used for?</h3>
<input type="radio" name="q1" value="0"> Styling<br>
<input type="radio" name="q1" value="1"> Interactivity<br>
<input type="radio" name="q1" value="0"> Database<br>

<br>

<h3>2. Which symbol is used for comments?</h3>
<input type="radio" name="q2" value="1"> //<br>
<input type="radio" name="q2" value="0"> ##<br>
<input type="radio" name="q2" value="0"> **<br>

<br>

<h3>3. Which keyword declares a variable?</h3>
<input type="radio" name="q3" value="1"> var<br>
<input type="radio" name="q3" value="0"> int<br>
<input type="radio" name="q3" value="0"> string<br>

<br><br>

<button onclick="check()">Submit Quiz</button>
<p align="right">
<a href="category.html">Back to category page</a>
</p>
</div>

<script>
function check(){
let correct = 0;
let answers = document.querySelectorAll("input[type=radio]:checked");

answers.forEach((ans)=>{
correct += Number(ans.value);
});

let total = 3;
let wrong = total - correct;

localStorage.setItem("correct",correct);
localStorage.setItem("wrong",wrong);
localStorage.setItem("total",total);

window.location="result.html";
}
</script>

</body>
</html>

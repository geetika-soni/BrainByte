<!DOCTYPE html>
<html>
<head>
<title>Computer Basics Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="b">

<div class="container">

<h1>Computer Basics</h1>

<h3>1. Brain of computer?</h3>
<input type="radio" name="q1" value="1"> CPU<br>
<input type="radio" name="q1" value="0"> RAM<br>
<input type="radio" name="q1" value="0"> Hard Disk<br>

<br>

<h3>2. Full form of CPU?</h3>
<input type="radio" name="q2" value="1"> Central Processing Unit<br>
<input type="radio" name="q2" value="0"> Computer Processing Unit<br>
<input type="radio" name="q2" value="0"> Central Program Unit<br>

<br>

<h3>3. Temporary memory?</h3>
<input type="radio" name="q3" value="1"> RAM<br>
<input type="radio" name="q3" value="0"> ROM<br>
<input type="radio" name="q3" value="0"> Hard Disk<br>

<br><br>

<button onclick="check()">Submit Quiz</button>

</div>

<script>
function check(){
let correct = 0;
let answers = document.querySelectorAll("input[type=radio]:checked");

answers.forEach((ans)=>{
correct += Number(ans.value);
});

let total = 3;
let wrong = total - correct;

localStorage.setItem("correct",correct);
localStorage.setItem("wrong",wrong);
localStorage.setItem("total",total);

window.location="result.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Maths Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="b">

<div class="container">

<h1>Maths Quiz</h1>

<h3>1. What is 12 × 8 ?</h3>
<input type="radio" name="q1" value="0"> 88<br>
<input type="radio" name="q1" value="1"> 96<br>
<input type="radio" name="q1" value="0"> 108<br>

<br>

<h3>2. What is the square of 13 ?</h3>
<input type="radio" name="q2" value="0"> 156<br>
<input type="radio" name="q2" value="1"> 169<br>
<input type="radio" name="q2" value="0"> 143<br>

<br>

<h3>3. What is √144 ?</h3>


<input type="radio" name="q3" value="0"> 10<br>
<input type="radio" name="q3" value="1"> 12<br>
<input type="radio" name="q3" value="0"> 14<br>

<br>

<h3>4. If 5x = 25, what is x?</h3>
<input type="radio" name="q4" value="1"> 5<br>
<input type="radio" name="q4" value="0"> 10<br>
<input type="radio" name="q4" value="0"> 15<br>

<br>

<h3>5. What is 15² ?</h3>
<input type="radio" name="q5" value="0"> 200<br>
<input type="radio" name="q5" value="1"> 225<br>
<input type="radio" name="q5" value="0"> 250<br>

<br><br>

<button onclick="check()">Submit Quiz</button>

</div>

<script>

function check(){

let correct = 0;

let answers = document.querySelectorAll("input[type=radio]:checked");

answers.forEach((ans)=>{
correct += Number(ans.value);
});

let total = 5;
let wrong = total - correct;

localStorage.setItem("correct",correct);
localStorage.setItem("wrong",wrong);
localStorage.setItem("total",total);

window.location="result.html";

}

</script>

</body>
</html>
